<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 純 HTML 上傳器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #1e293b; margin-top: 0; }
        label { font-weight: 600; color: #475569; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Roblox 直連上傳器</h2>
    
    <label>🔑 Open Cloud API Key:</label>
    <input type="text" id="apiKey" placeholder="請貼上你的 API Key">
    
    <label>🆔 我的 User ID (純數字):</label>
    <input type="text" id="userId" placeholder="例如: 12345678">
    
    <label>📦 選擇 3D 檔案 (.fbx / .glb):</label>
    <input type="file" id="fileInput" accept=".fbx,.glb">
    
    <button onclick="startUpload()">🚀 開始上傳</button>
    
    <div id="status"></div>
</div>

<script>
async function startUpload() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const userId = document.getElementById('userId').value.trim();
    const file = document.getElementById('fileInput').files[0];
    const statusBox = document.getElementById('status');

    if (!apiKey || !userId || !file) {
        alert('請填寫所有欄位並選擇檔案！');
        return;
    }

    statusBox.style.display = 'block';
    statusBox.style.background = '#e2e3e5';
    statusBox.style.color = '#383d41';
    statusBox.innerText = '⏳ 正在直接發送請求給 Roblox...';

    // 依據副檔名自動判斷檔案格式
    let contentType = 'application/octet-stream';
    if (file.name.endsWith('.fbx')) contentType = 'model/fbx';
    if (file.name.endsWith('.glb')) contentType = 'model/gltf-binary';

    const metadata = {
        assetType: "Model",
        displayName: "HTML_Direct_Upload",
        description: "Uploaded via pure HTML",
        creationContext: { creator: { userId: userId } }
    };

    const formData = new FormData();
    // 將元數據打包成 Blob 放入表單
    formData.append('request', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('fileContent', file, file.name);

    try {
        const response = await fetch('https://apis.roblox.com/assets/v1/assets', {
            method: 'POST',
            headers: {
                'x-api-key': apiKey
                // 注意：不要手動設定 Content-Type，瀏覽器會自動生成帶有 boundary 的 multipart/form-data
            },
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            statusBox.style.background = '#dcfce7';
            statusBox.style.color = '#166534';
            statusBox.innerHTML = `<b>🎉 上傳成功！</b><br><br><b>Operation ID:</b><br>${data.path}`;
        } else {
            statusBox.style.background = '#fee2e2';
            statusBox.style.color = '#991b1b';
            statusBox.innerHTML = `<b>❌ 伺服器拒絕：</b><br>${JSON.stringify(data)}`;
        }
    } catch (err) {
        statusBox.style.background = '#fee2e2';
        statusBox.style.color = '#991b1b';
        statusBox.innerHTML = `<b>❌ 傳輸失敗 (CORS 跨網域封鎖)：</b><br>純 HTML 網頁如果直接在瀏覽器打開，會因為安全性限制（CORS）被阻擋直連 Roblox 伺服器。這就是為什麼通常需要用 iSH 或伺服器中轉的原因。`;
    }
}
</script>

</body>
</html>
