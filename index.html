<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 網頁直連上傳器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; color: #fff; margin-top: 0; font-size: 22px; }
        label { font-weight: 600; color: #aaa; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover { background: #cccccc; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 ROBLOX ASSET UPLOADER</h2>
    
    <label>// IMPORTANT STUFF</label>
    <input type="text" id="apiKey" placeholder="ENTER API KEY">
    
    <label>CREATOR ID (USER ID)</label>
    <input type="text" id="userId" placeholder="ENTER USER ID">
    
    <label>// ASSET STUFF</label>
    <input type="file" id="fileInput">
    
    <button onclick="startUpload()">➔ UPLOAD</button>
    
    <div id="status"></div>
</div>

<script>
async function startUpload() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const userId = document.getElementById('userId').value.trim();
    const file = document.getElementById('fileInput').files[0];
    const statusBox = document.getElementById('status');

    if (!apiKey || !userId || !file) {
        alert('請填寫所有欄位並選擇檔案！');
        return;
    }

    statusBox.style.display = 'block';
    statusBox.style.background = '#2a2a2a';
    statusBox.style.color = '#aaa';
    statusBox.style.border = '1px solid #444';
    statusBox.innerText = '⏳ 正在透過解鎖通道上傳至 Roblox 雲端...';

    let contentType = 'application/octet-stream';
    if (file.name.toLowerCase().endsWith('.fbx')) contentType = 'model/fbx';
    if (file.name.toLowerCase().endsWith('.glb')) contentType = 'model/gltf-binary';

    const metadata = {
        assetType: "Model",
        displayName: file.name.split('.')[0],
        description: "Uploaded via pure HTML iPad",
        creationContext: { creator: { userId: userId } }
    };

    const formData = new FormData();
    formData.append('request', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('fileContent', file, file.name);

    // ✨ 核心黑科技：利用 corsproxy.io 代理，直接在 iPad 瀏覽器裡完美繞過 CORS 阻擋
    const robloxTargetUrl = 'https://apis.roblox.com/assets/v1/assets';
    const proxiedUrl = 'https://corsproxy.io/?' + encodeURIComponent(robloxTargetUrl);

    try {
        const response = await fetch(proxiedUrl, {
            method: 'POST',
            headers: {
                'x-api-key': apiKey
            },
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            statusBox.style.background = '#1b4332';
            statusBox.style.color = '#75e6da';
            statusBox.style.border = '1px solid #2d6a4f';
            statusBox.innerHTML = `<b>SUCCESS!</b><br><br>Operation: ${data.path}<br><br>Check your Toolbox under "My Packages" in a moment.`;
        } else {
            statusBox.style.background = '#4a1212';
            statusBox.style.color = '#ff9999';
            statusBox.style.border = '1px solid #6b1d1d';
            statusBox.innerHTML = `<b>FAILED:</b><br>${JSON.stringify(data)}`;
        }
    } catch (err) {
        statusBox.style.background = '#4a1212';
        statusBox.style.color = '#ff9999';
        statusBox.style.border = '1px solid #6b1d1d';
        statusBox.innerHTML = `<b>CONNECTION ERROR:</b><br>傳輸通道發生未知錯誤，請確認網路連線或 API Key 是否正確。`;
    }
}
</script>

</body>
</html>
